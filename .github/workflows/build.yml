name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Download NDK and SDK manually
      run: |
        # Скачиваем NDK r23b
        wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
        unzip -q android-ndk-r23b-linux.zip -d ~/.buildozer/android/platform/
        
        # Скачиваем SDK Command Line Tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d ~/.buildozer/android/platform/
        
        # Создаем структуру, которую ждет Buildozer
        mv ~/.buildozer/android/platform/cmdline-tools ~/.buildozer/android/platform/latest
        mkdir -p ~/.buildozer/android/platform/cmdline-tools
        mv ~/.buildozer/android/platform/latest ~/.buildozer/android/platform/cmdline-tools/
        
        # Устанавливаем пути
        export ANDROID_HOME="$HOME/.buildozer/android/platform"
        export ANDROID_NDK_HOME="$HOME/.buildozer/android/platform/android-ndk-r23b"
        
        # Принимаем лицензии
        yes | ~/.buildozer/android/platform/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

    - name: Create Buildozer config
      run: |
        mkdir -p ~/.buildozer
        echo "[app]" > ~/.buildozer/default.spec
        echo "android.accept_sdk_license = True" >> ~/.buildozer/default.spec
        echo "android.ndk = 23b" >> ~/.buildozer/default.spec
        echo "android.sdk = 30" >> ~/.buildozer/default.spec

    - name: Build APK
      run: |
        export ANDROID_HOME="$HOME/.buildozer/android/platform"
        export ANDROID_NDK_HOME="$HOME/.buildozer/android/platform/android-ndk-r23b"
        export P4A_NDK_VERSION="23b"
        export P4A_SDK_VERSION="30"
        export BUILDOZER_AUTO_ACCEPT=1
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MyApp
        path: bin/*.apk
