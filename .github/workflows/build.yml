name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # КЛЮЧЕВОЙ МОМЕНТ: Подмена ссылок на актуальное зеркало
    - name: Configure Buildozer to use working NDK/SDK mirrors
      run: |
        mkdir -p ~/.buildozer
        cat > ~/.buildozer/default.spec << EOF
[app]
android.accept_sdk_license = True
android.ndk = 23b
android.sdk = 30
android.ndk_url = https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
android.sdk_url = https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
EOF

    - name: Build APK
      run: |
        # Явно говорим версии, игнорируем автообновления
        export P4A_NDK_VERSION="23b"
        export P4A_SDK_VERSION="30"
        export BUILDOZER_AUTO_ACCEPT=1
        
        # САМЫЙ ВАЖНЫЙ ФЛАГ: отключаем проверку обновлений, чтобы не лез на битый URL
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MyApp
        path: bin/*.apk
