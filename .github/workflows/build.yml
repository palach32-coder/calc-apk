name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer
          pip3 install --user --upgrade cython==0.29.33

      - name: Setup Android SDK
        run: |
          # Устанавливаем путь к SDK
          export ANDROID_HOME=/home/runner/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Устанавливаем SDK-менеджер и компоненты вручную
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O tools.zip
          unzip tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          
          # Принимаем лицензии
          yes | sdkmanager --licenses
          
          # Устанавливаем нужные инструменты
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.1"

      - name: Build with Buildozer
        env:
          ANDROID_HOME: /home/runner/android-sdk
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
