name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Create Buildozer config with working mirrors
      run: |
        mkdir -p ~/.buildozer
        echo "[app]" > ~/.buildozer/default.spec
        echo "android.accept_sdk_license = True" >> ~/.buildozer/default.spec
        echo "android.ndk = 23b" >> ~/.buildozer/default.spec
        echo "android.sdk = 30" >> ~/.buildozer/default.spec
        echo "android.ndk_url = https://dl.google.com/android/repository/android-ndk-r23b-linux.zip" >> ~/.buildozer/default.spec
        echo "android.sdk_url = https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" >> ~/.buildozer/default.spec

    - name: Build APK
      run: |
        export P4A_NDK_VERSION="23b"
        export P4A_SDK_VERSION="30"
        export BUILDOZER_AUTO_ACCEPT=1
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MyApp
        path: bin/*.apk
